
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI DRAMA LIVE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #050505; }
        .channel-card { transition: transform 0.2s; background: #111; border: 1px solid #222; }
        .channel-card:active { transform: scale(0.95); }
    </style>
</head>
<body class="text-white">
    <header class="sticky top-0 z-50 bg-black/80 backdrop-blur-md p-4 border-b border-red-600 text-center">
        <h1 class="text-xl font-bold text-red-600">AI DRAMA LIVE 📺</h1>
    </header>

    <main class="p-4 grid grid-cols-3 gap-3" id="app">
        <div class="channel-card rounded-lg p-2 text-center">
            <img src="https://logodownload.org/wp-content/uploads/2019/08/bein-sports-logo-0.png" class="w-full h-16 object-contain">
            <p class="text-[10px] mt-1">beIN 1</p>
        </div>
        <div class="channel-card rounded-lg p-2 text-center">
            <img src="https://upload.wikimedia.org/wikipedia/commons/d/d2/MBC1_Logo.png" class="w-full h-16 object-contain">
            <p class="text-[10px] mt-1">MBC 1</p>
        </div>
        <div class="channel-card rounded-lg p-2 text-center">
            <img src="https://upload.wikimedia.org/wikipedia/commons/e/e4/OSN_logo.svg" class="w-full h-16 object-contain">
            <p class="text-[10px] mt-1">OSN</p>
        </div>
    </main>

    <nav class="fixed bottom-0 w-full bg-[#111] border-t border-gray-800 flex justify-around p-3 text-xs">
        <a href="#" class="text-red-500">📺 القنوات</a>
        <a href="#" class="text-gray-400">🎬 أفلام</a>
        <a href="#" class="text-gray-400">⚽ كورة</a>
    </nav>
</body>
</html>
